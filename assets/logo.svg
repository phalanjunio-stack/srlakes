<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#1c1c20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0c068"/>
      <stop offset="1" stop-color="#9c7d2c"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8d4ce"/>
      <stop offset="1" stop-color="#8aaaA4"/>
    </linearGradient>
  </defs>

  <!-- Shield outline -->
  <path d="M20 36 L120 12 L220 36 L220 232 L120 264 L20 232 Z" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Inner hairline -->
  <path d="M30 46 L120 24 L210 46 L210 224 L120 254 L30 224 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity=".85"/>
  <!-- Black ring between -->
  <path d="M26 41 L120 18 L214 41 L214 228 L120 259 L26 228 Z" fill="none" stroke="#0c0c0e" stroke-width="2"/>

  <!-- Headstock body -->
  <path d="M92 38 L148 38 L150 92 Q150 102 140 102 L100 102 Q90 102 90 92 Z" fill="#f4f1ec"/>
  <text x="120" y="58" text-anchor="middle" font-family="Impact,'Bebas Neue',sans-serif" font-size="13" font-weight="700" fill="#1a1a1c" letter-spacing="2">BANDA</text>

  <!-- Tuning pegs -->
  <g fill="#0c0c0e">
    <circle cx="104" cy="74" r="3"/><circle cx="120" cy="74" r="3"/><circle cx="136" cy="74" r="3"/>
    <circle cx="104" cy="88" r="3"/><circle cx="120" cy="88" r="3"/><circle cx="136" cy="88" r="3"/>
  </g>

  <!-- Strings (6 going down) -->
  <g stroke="#0c0c0e" stroke-width="1.2">
    <line x1="100" y1="102" x2="98" y2="170"/>
    <line x1="108" y1="102" x2="107" y2="170"/>
    <line x1="116" y1="102" x2="116" y2="170"/>
    <line x1="124" y1="102" x2="124" y2="170"/>
    <line x1="132" y1="102" x2="133" y2="170"/>
    <line x1="140" y1="102" x2="142" y2="170"/>
  </g>
  <!-- Bridge -->
  <rect x="100" y="166" width="40" height="8" rx="1" fill="#f4f1ec"/>
  <rect x="112" y="174" width="16" height="6" fill="#f4f1ec"/>

  <!-- Gold side bars (frets) -->
  <g fill="url(#gold)">
    <rect x="56" y="64" width="22" height="10" rx="3"/>
    <rect x="56" y="80" width="22" height="10" rx="3"/>
    <rect x="56" y="96" width="22" height="10" rx="3"/>
    <rect x="162" y="64" width="22" height="10" rx="3"/>
    <rect x="162" y="80" width="22" height="10" rx="3"/>
    <rect x="162" y="96" width="22" height="10" rx="3"/>
  </g>

  <!-- Stars -->
  <g fill="#f4f1ec">
    <polygon points="48,132 52,142 62,142 54,148 57,158 48,152 39,158 42,148 34,142 44,142"/>
    <polygon points="192,132 196,142 206,142 198,148 201,158 192,152 183,158 186,148 178,142 188,142"/>
  </g>

  <!-- SR. -->
  <text x="56" y="174" font-family="Impact,'Bebas Neue',sans-serif" font-size="20" font-weight="700" fill="#f4f1ec" letter-spacing="1">SR.</text>

  <!-- LAKES -->
  <text x="120" y="218" text-anchor="middle" font-family="Impact,'Bebas Neue',sans-serif" font-size="56" font-weight="900" fill="url(#sage)" letter-spacing="-1">LAKES</text>

  <!-- Triangle below -->
  <polygon points="112,228 128,228 120,242" fill="url(#sage)"/>
</svg>
