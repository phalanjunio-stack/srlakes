<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#15151a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0c068"/>
      <stop offset="1" stop-color="#9c7d2c"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8d4ce"/>
      <stop offset="1" stop-color="#8aaba4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Inner gold border -->
  <rect x="32" y="32" width="448" height="448" rx="72" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <rect x="48" y="48" width="416" height="416" rx="60" fill="none" stroke="#f4f1ec" stroke-width="2" opacity=".7"/>

  <!-- Headstock -->
  <path d="M186 90 L326 90 L332 230 Q332 254 308 254 L204 254 Q180 254 180 230 Z" fill="#f4f1ec"/>
  <text x="256" y="148" text-anchor="middle" font-family="Impact,'Bebas Neue',sans-serif" font-size="32" font-weight="900" fill="#15151a" letter-spacing="3">BANDA</text>

  <!-- Tuning pegs -->
  <g fill="#15151a">
    <circle cx="220" cy="184" r="9"/><circle cx="256" cy="184" r="9"/><circle cx="292" cy="184" r="9"/>
    <circle cx="220" cy="220" r="9"/><circle cx="256" cy="220" r="9"/><circle cx="292" cy="220" r="9"/>
  </g>

  <!-- Strings -->
  <g stroke="#15151a" stroke-width="3">
    <line x1="218" y1="254" x2="216" y2="334"/>
    <line x1="234" y1="254" x2="234" y2="334"/>
    <line x1="250" y1="254" x2="250" y2="334"/>
    <line x1="262" y1="254" x2="262" y2="334"/>
    <line x1="278" y1="254" x2="278" y2="334"/>
    <line x1="294" y1="254" x2="296" y2="334"/>
  </g>
  <rect x="216" y="328" width="80" height="14" rx="2" fill="#f4f1ec"/>

  <!-- LAKES text -->
  <text x="256" y="430" text-anchor="middle" font-family="Impact,'Bebas Neue',sans-serif" font-size="92" font-weight="900" fill="url(#sage)" letter-spacing="-2">LAKES</text>

  <!-- SR. tag -->
  <text x="146" y="380" font-family="Impact,'Bebas Neue',sans-serif" font-size="32" font-weight="900" fill="#f4f1ec">SR.</text>
</svg>
